name: Build and Release Joe RPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  AZURELINUX_REF: tomls/base/main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Checkout Azure Linux
        uses: actions/checkout@v4
        with:
          repository: microsoft/azurelinux
          ref: ${{ env.AZURELINUX_REF }}
          path: azurelinux

      - name: Add joe component
        working-directory: azurelinux
        run: |
          # Insert joe component (alphabetically between jo and jomolhari-fonts)
          sed -i '/^\[components\.jo\]$/a [components.joe]' base/comps/components.toml

      - name: Build container image
        run: docker build --platform ${{ matrix.platform }} -t joe-builder .

      - name: Update lock
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            --cap-add=SYS_ADMIN \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            -v "${{ github.workspace }}/azurelinux:/workdir" \
            joe-builder \
            bash -c "azldev comp update -p joe -q"

      - name: Render spec
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            --cap-add=SYS_ADMIN \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            -v "${{ github.workspace }}/azurelinux:/workdir" \
            joe-builder \
            bash -c "azldev comp render -p joe -q"

      - name: Build RPM
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            --cap-add=SYS_ADMIN \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            -v "${{ github.workspace }}/azurelinux:/workdir" \
            joe-builder \
            bash -c "azldev comp build -p joe -q"

      - name: Collect RPMs
        run: |
          mkdir -p rpms
          cp azurelinux/base/out/rpms/rpm-sdk/joe-*.rpm rpms/ 2>/dev/null || true
          cp azurelinux/base/out/rpms/joe-*.rpm rpms/ 2>/dev/null || true

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.arch }}
          path: rpms/

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-rpms
          merge-multiple: true

      - name: Generate repo metadata
        run: |
          mkdir -p repo
          cp all-rpms/*.rpm repo/
          docker run --rm -v "${{ github.workspace }}/repo:/repo" \
            registry.fedoraproject.org/fedora:43 \
            bash -c "dnf -y install createrepo_c && createrepo_c /repo"

      - name: Create tarball of repo
        run: tar czf joe-azl-repo.tar.gz -C repo .

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "joe for Azure Linux — ${{ github.ref_name }}"
          body: |
            ## Joe's Own Editor for Azure Linux

            ### Quick install (standalone RPM)
            ```bash
            # x86_64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/joe-<version>.x86_64.rpm
            sudo tdnf install ./joe-*.x86_64.rpm

            # aarch64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/joe-<version>.aarch64.rpm
            sudo tdnf install ./joe-*.aarch64.rpm
            ```

            ### As a TDNF repo (with updates)
            ```bash
            sudo tee /etc/yum.repos.d/joe-editor.repo << 'EOF'
            [joe-editor]
            name=Joe Editor for Azure Linux
            baseurl=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/
            enabled=1
            gpgcheck=0
            EOF
            sudo tdnf install joe
            ```

            > **Note:** GitHub Releases URLs don't work directly as a `baseurl` for TDNF.
            > Download `joe-azl-repo.tar.gz`, extract to a local/hosted directory, and point `baseurl` there.
            > The repo tarball contains RPMs for both x86_64 and aarch64.
          files: |
            repo/joe-[0-9]*.rpm
            repo/joe-debug*.rpm
            joe-azl-repo.tar.gz
